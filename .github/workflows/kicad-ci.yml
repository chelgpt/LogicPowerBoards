name: KiCad validation and fabrication package

on:
  workflow_dispatch:

jobs:
  text-validation:
    name: Text/netlist validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository validator
        run: python3 scripts/validate_repo.py

  kicad-cli-export:
    name: KiCad ERC DRC Gerber export
    runs-on: ubuntu-latest
    needs: text-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install KiCad CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y kicad
          kicad-cli --version

      - name: Run ERC DRC and fabrication export
        run: bash scripts/kicad_export.sh

      - name: Upload fabrication output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fabrication-output
          path: fabrication_output
          if-no-files-found: warn
